<html>
<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link href="https://fonts.googleapis.com/css?family=Raleway:100" rel="stylesheet">
    <link rel="icon" href="Capture.PNG">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap');

        input:focus {
            outline: none;
        }

        ::placeholder {
            font-family: 'Raleway', sans-serif;
            color: rgb(243, 156, 18);
        }

        #b1 {
            display: inline-block;
            background: transparent;
            border: 2px solid rgb(243, 156, 18);
            padding: 10px 30px;
            color: rgb(243, 156, 18);
            font-family: 'Montserrat', sans-serif;
            transition: all 0.25s;
            border-radius: 5px;
        }

            #b1:hover, .buttons:hover, .buttons:focus {
                color: white;
                background: rgb(243, 156, 18);
            }

        body {
            background-color: rgb(21, 21, 21);
            border: 2px solid rgb(243, 156, 18);
            border-radius: 20px;
            background-image: url('background.jpg');
            background-size: cover;
            overflow: hidden;
            height:100%;
            box-sizing: border-box;
            margin: 0;
        }

        .center {
            position:relative;
            display:block;
            text-align: center;
            box-sizing: border-box;
            height:100%;
            padding-top: 10%;
        }

        .button {
            transition: all 0.25s;
            color: white;
            background-image: url('profile.png');
            background-color: rgb(243, 156, 18);
            background-size: contain;
            display: block;
            border: 2px solid rgb(243, 156, 18);
            width: 40vw;
            height: 40vw;
            line-height: 40vw;
            font-family: 'Montserrat', sans-serif;
            border-radius: 100%;
        }

        @keyframes fadein {
            from {
                opacity: 0;
                transform: scale(85%);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        .fadein {
            animation-name: fadein;
            animation-duration: 1s;
        }

        @keyframes fadein2 {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        .fadein2 {
            animation-name: fadein2;
            animation-duration: 1s;
        }
        @keyframes fadein3 {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        .fadein3 {
            animation-name: fadein3;
            animation-duration: 1s;
        }
        img {

            width: 50%;
        }

        @media only screen and (min-width: 1224px) {
            img {
                width: 10%;
            }
        }
        #companies {
            border-radius: 20px;
            background: rgba(0,0,0, 0.5);
            display: block;
            position: absolute;
            width: 100%;
            height: 45%;
            padding: 10 0 0 10;
            bottom: 0%;
            box-sizing: border-box;
            border-top: 2px solid rgb(243, 156, 18);
        }
        .company {
            transition: all 0.25s;
            user-select: none;
            display: inline-block;
            color: white;
            background: rgba(243, 156, 18,0.5);
            width: 30vw;
            height: 30vw;
            float: left;
            line-height: 30vw;
            border-radius: 20px;
            margin: 3;
            font-family: 'Montserrat', sans-serif;
            border: 2px solid rgb(243, 156, 18);
            box-sizing: border-box;
        }
            .company:hover, .company:focus{
                background: rgba(243, 156, 18,1);
            }
        .buttons {
            transition: all 0.25s;
            user-select: none;
            display: inline-block;
            color: white;
            background: transparent;
            position: absolute;
            width: 15vw;
            height: 15vw;
            line-height: 14vw;
            margin: 10;
            float: left;
            border-radius: 50%;
            font-family: 'Montserrat', sans-serif;
            border: 2px solid rgb(243, 156, 18);
            box-sizing: border-box;
        }
        a, a:hover, a:focus, a:active {
            text-decoration: none;
            -webkit-tap-highlight-color: transparent !important;
        }
    </style>
    <title>
        Launch Zone
    </title>
</head>
<body>
    <div class="center">
        <a href="menu.html"class="buttons" style=" left: 0;"><</a>
        <a href="index.html"class="buttons" style=" right: 0; font-size: 50%;">Log Out</a>
        <img class="fadein2" src="Capture.PNG" style=""></img>
        <div style=" padding: 10% 10% 10% 10%; ">
            <div class="button fadein" style="margin: 0 auto"> </div>
            <p style="color: white; font-family: 'Montserrat', sans-serif; ">Username</p>
        </div>
        <div class="fadein3"id="companies">
            <p style="color: white; text-align: left; font-family: 'Montserrat', sans-serif; margin:10 auto 5 10; font-size: 20">Portfolio</p>
            <a href="company1.html"class="company">Company 1</a>
            <div onclick="location.href='newcompany.html';" class="company" style="background: transparent; border: 2px dashed rgb(243, 156, 18)">+</div>
        </div>


    </div>
</body>
<html>
