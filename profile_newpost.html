<html>
<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link href="https://fonts.googleapis.com/css?family=Raleway:100" rel="stylesheet">
    <link rel="icon" href="Capture.PNG">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300&display=swap');

        #username, #password {
            font-family: 'Montserrat', sans-serif;
            color: white;
            border: 2px solid rgba(243, 156, 18, 0);
            text-decoration: none;
            padding: 10px 30px;
            border-radius: 5px;
            background-color: transparent;
            transition: all 0.25s;
            width: 80%;
            display:inline-block;
            font-size: 100%;
        }
            #username::placeholder {
                color: white;
                font-family: 'Montserrat', sans-serif;
            }
        input:focus {
            outline: none;
        }

        ::placeholder {
            font-family: 'Raleway', sans-serif;
            color: rgb(243, 156, 18);
        }

        #b1 {
            display: inline-block;
            background: transparent;
            border: 2px solid rgb(243, 156, 18);
            padding: 10;
            color: white;
            height: 100%;
            width: 15%;
            font-family: 'Montserrat', sans-serif;
            transition: all 0.25s;
            border-radius: 20px;
            box-sizing: border-box;
        }

            #b1:hover, .buttons:hover, .buttons:focus {
                color: white;
                background: rgb(243, 156, 18);
            }

        body {
            background-color: rgb(21, 21, 21);
            border: 2px solid rgb(243, 156, 18);
            border-radius: 20px;
            background-image: url('background.jpg');
            background-size: cover;
            overflow: hidden;
            height: 100%;
            box-sizing: border-box;
            margin: 0;
        }

        .center {
            position: relative;
            display: block;
            text-align: center;
            box-sizing: border-box;
            height: 100%;
            padding-top: 5%;
        }

        .button {
            transition: all 0.25s;
            color: white;
            background-image: url('profile.png');
            background-color: rgb(243, 156, 18);
            background-size: contain;
            display: block;
            border: 2px solid rgb(243, 156, 18);
            width: 40vw;
            height: 40vw;
            line-height: 40vw;
            font-family: 'Montserrat', sans-serif;
            border-radius: 100%;
        }

        @keyframes fadein {
            from {
                opacity: 0;
                transform: scale(85%);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        .fadein {
            animation-name: fadein;
            animation-duration: 1s;
        }

        @keyframes fadein2 {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        .fadein2 {
            animation-name: fadein2;
            animation-duration: 1s;
        }

        @keyframes fadein3 {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        .fadein3 {
            animation-name: fadein3;
            animation-duration: 1s;
        }

        img {
            width: 50%;
        }

        @media only screen and (min-width: 1224px) {
            img {
                width: 10%;
            }
        }

        #companies {
            background: transparent;
            display: block;
            position: absolute;
            width: 100%;
            height: 15%;
            padding: 10 10 0 10;
            bottom: 0%;
            box-sizing: border-box;
            text-align: center;
        }

        .company {
            transition: all 0.25s;
            user-select: none;
            display: inline-block;
            color: white;
            background: transparent;
            width: 15vw;
            height: 15vw;
            line-height: 15vw;
            border-radius: 20px;
            margin: 0 auto;
            font-family: 'Montserrat', sans-serif;
            border: 2px solid rgb(243, 156, 18);
            box-sizing: border-box;
        }

            .company:hover, .company:focus {
                background: rgba(243, 156, 18,1);
            }

        .buttons {
            transition: all 0.25s;
            user-select: none;
            display: inline-block;
            color: white;
            background: transparent;
            position: absolute;
            width: 15vw;
            height: 15vw;
            line-height: 14.5vw;
            margin: 10;
            margin-top: 0;
            float: left;
            border-radius: 50%;
            font-family: 'Montserrat', sans-serif;
            border: 2px solid rgb(243, 156, 18);
            box-sizing: border-box;
        }

        a, a:hover, a:focus, a:active {
            text-decoration: none;
            -webkit-tap-highlight-color: transparent !important;
        }

        #header {
            padding-bottom: 20px;
        }

        .post {
            display: inline-block;
            width: fit-content;
            height: fit-content;
            padding: 10;
            background: transparent;
            margin: 10;
            color: white;
            border-radius: 20px;
            text-align: center;
            font-family: 'Roboto', sans-serif;
            border: 2px solid rgb(243, 156, 18);

        }
    </style>
    <title>
        Launch Zone
    </title>
</head>
<body>
    <div class="center">
        <div class="fadein2" id="header">
            <a href="profile.html" class="buttons" style=" right: 0;"><</a>
            <h1 class="" style="color: white; font-family: 'Montserrat', sans-serif; text-align: left; margin: 0 0 0 20; font-size: 300%; ">New </br>Post</h1>
        </div>
        <div style="margin: 10;">
            <div class="post fadein">
                Upload Picture
            </div>
        </div>
        <div id="" class="fadein3">
            <form style="margin: 0; border: 2px solid rgb(243, 156, 18); padding: 10px 0 10px 0; border-radius: 20px; height: fit-content; margin: 10;">
                <input type="text" id="username" placeholder="Caption">
            </form>
            <div class="post fadein">
                Post</br>
                (Doesnt Work Yet)
            </div>
        </div>


    </div>
</body>
<html>
