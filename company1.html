<html>
<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link href="https://fonts.googleapis.com/css?family=Raleway:100" rel="stylesheet">
    <link rel="icon" href="Capture.PNG">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap');

        input:focus {
            outline: none;
        }

        ::placeholder {
            font-family: 'Raleway', sans-serif;
            color: rgb(243, 156, 18);
        }

        #b1 {
            display: inline-block;
            background: transparent;
            border: 2px solid rgb(243, 156, 18);
            padding: 10px 30px;
            color: rgb(243, 156, 18);
            font-family: 'Montserrat', sans-serif;
            transition: all 0.25s;
            border-radius: 5px;
        }

            #b1:hover, .buttons:hover, .buttons:focus {
                color: white;
                background: rgb(243, 156, 18);
            }

        body {
            background-color: rgb(21, 21, 21);
            border: 2px solid rgb(243, 156, 18);
            border-radius: 20px;
            background-image: url('background.jpg');
            background-size: cover;
            overflow: hidden;
            height: 100%;
            box-sizing: border-box;
            margin: 0;
        }

        .center {
            position: relative;
            display: block;
            text-align: center;
            box-sizing: border-box;
            height: 100%;
        }

        .button {
            transition: all 0.25s;
            color: white;
            background-image: url('logo.jpg');
            background-color: rgb(243, 156, 18);
            background-size: contain;
            display: block;
            border: 2px solid rgb(243, 156, 18);
            width: 40vw;
            height: 40vw;
            line-height: 40vw;
            font-family: 'Montserrat', sans-serif;
            border-radius: 100%;
        }

        @keyframes fadein {
            from {
                opacity: 0;
                transform: scale(85%);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        .fadein {
            animation-name: fadein;
            animation-duration: 1s;
        }

        @keyframes fadein2 {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        .fadein2 {
            animation-name: fadein2;
            animation-duration: 1s;
        }

        @keyframes fadein3 {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        .fadein3 {
            animation-name: fadein3;
            animation-duration: 1s;
        }

        img {
            width: 50%;
        }

        @media only screen and (min-width: 1224px) {
            img {
                width: 10%;
            }
        }

        #companies {
            background: transparent;
            display: flex;
            width: 100%;
            height: 12%;
            padding: 10 10 10 10;
            bottom: 0%;
            box-sizing: border-box;
            border-top: 2px solid rgb(243, 156, 18);
            text-align: center;
            vertical-align: middle;
        }

        .company {
            transition: all 0.25s;
            user-select: none;
            display: inline-block;
            color: white;
            background: transparent;
            width: 15vw;
            height: 15vw;
            line-height: 15vw;
            border-radius: 20px;
            margin: auto auto;
            font-family: 'Montserrat', sans-serif;
            border: 2px solid rgb(243, 156, 18);
            box-sizing: border-box;
        }

            .company:hover, .company:focus {
                background: rgba(243, 156, 18,1);
            }

        .buttons {
            transition: all 0.25s;
            user-select: none;
            display: inline-block;
            color: white;
            background: transparent;
            position: absolute;
            width: 15vw;
            height: 15vw;
            line-height: 14.5vw;
            margin: 10;
            margin-top: 0;
            float: left;
            border-radius: 50%;
            font-family: 'Montserrat', sans-serif;
            border: 2px solid rgb(243, 156, 18);
            box-sizing: border-box;
        }

        a, a:hover, a:focus, a:active {
            text-decoration: none;
            -webkit-tap-highlight-color: transparent !important;
        }

        .header {
            padding-top: 8%;
            padding-bottom: 8%;
            border-bottom: 2px solid rgb(243, 156, 18);
        }

        .post {
            display: inline-block;
            width: 80%;
            height: fit-content;
            background: rgba(243, 156, 18, 0.3);
            margin: 30 0 10 0;
            border-radius: 20px;
            border: 2px solid rgb(243, 156, 18);
            box-sizing: border-box;
        }

        .postbuttons {
            transition: all 0.25s;
            user-select: none;
            display: inline-block;
            color: white;
            background: transparent;
            width: 10vw;
            height: 10vw;
            margin: 5;
            border-radius: 50%;
            font-family: 'Montserrat', sans-serif;
            border: 1px solid rgb(243, 156, 18);
            box-sizing: border-box;
            padding: 5;
        }

            .postbuttons:hover {
                background: rgb(243, 156, 18);
            }
        .progressbar {
            display: inline-block;
            width: 80%;
            height: 10%;
            padding:10;
            vertical-align: middle;
            font-family: 'Montserrat', sans-serif;
            background: rgba(0,0,0, 0.5);
            margin-top: 30;
            border-radius: 20px;
            border: 2px solid rgb(243, 156, 18);
            box-sizing: border-box;
            color: white;
            position:relative;
        }
    </style>
    <title>
        Launch Zone
    </title>
</head>
<body>
    <div class="center">
        <div class="fadein2 header">
            <a href="profile.html" class="buttons" style=" right: 0;"><</a>
            <h1 class="" style="color: white; font-family: 'Montserrat', sans-serif; text-align: left; margin: 0 0 0 20; font-size: 200%; ">Company 1</h1>
        </div>
        <div style="height: 70%; background: rgba(0,0,0, 0.3);overflow: scroll">
            <div class="button fadein" style="margin: 0 auto; margin-top: 30;"> </div>
            <div class="fadein3 progressbar ">Progress<div class="progressbar" style="position: absolute; left: 0; top: 0; margin: 0; height: 100%; background: rgba(243, 156, 18, 0.3);border:none;"></div></div>
            <div class="post fadein3">
                <div class="header" style="padding: 20px; text-align: left; ">
                    <p style="display: inline-block; margin: 1px; color: white; font-family: 'Montserrat', sans-serif; ">Analytics</p>
                </div>
                <img src="graph.png" style="width: 100%; user-select: none" />
                <div style=" font-family: 'Raleway', sans-serif; color: white; padding-left: 20; text-align: left; border-top: 2px solid rgb(243, 156, 18)">
                    <p>Date: 2/10/2022</p>
                    <p> Total Sales: 200,000</p>
                </div>
            </div>

        </div>
        <div class="fadein3" style="border-top: 2px solid rgba(243, 156, 18,1); padding: 10;">
        <a href="company1_todo.html" class="progressbar" style="margin: 5; background: rgba(16, 194, 111,0.8); padding: 20;">Continue</a>
        </div>


    </div>
</body>
<html>
