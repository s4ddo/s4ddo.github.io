<html>
<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link href="https://fonts.googleapis.com/css?family=Raleway:100" rel="stylesheet">
    <link rel="icon" href="Capture.PNG">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap');

        input:focus {
            outline: none;
        }

        ::placeholder {
            font-family: 'Raleway', sans-serif;
            color: rgb(243, 156, 18);
        }

        #b1 {
            display: inline-block;
            background: transparent;
            border: 2px solid rgb(243, 156, 18);
            padding: 10px 30px;
            color: rgb(243, 156, 18);
            font-family: 'Montserrat', sans-serif;
            transition: all 0.25s;
            border-radius: 5px;
        }

            #b1:hover, .buttons:hover, .buttons:focus {
                color: white;
                background: rgb(243, 156, 18);
            }

        body {
            background-color: rgb(21, 21, 21);
            border: 2px solid rgb(243, 156, 18);
            border-radius: 20px;
            background-image: url('background.jpg');
            background-size: cover;
            overflow: hidden;
            height: 100%;
            box-sizing: border-box;
            margin: 0;
        }

        .center {
            position: relative;
            display: block;
            text-align: center;
            box-sizing: border-box;
            height: 100%;
        }

        .button {
            transition: all 0.25s;
            color: white;
            background-image: url('profile.png');
            background-color: rgb(243, 156, 18);
            background-size: contain;
            display: block;
            border: 2px solid rgb(243, 156, 18);
            width: 40vw;
            height: 40vw;
            line-height: 40vw;
            font-family: 'Montserrat', sans-serif;
            border-radius: 100%;
        }

        @keyframes fadein {
            from {
                opacity: 0;
                transform: scale(85%);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        .fadein {
            animation-name: fadein;
            animation-duration: 1s;
        }

        @keyframes fadein2 {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        .fadein2 {
            animation-name: fadein2;
            animation-duration: 1s;
        }

        @keyframes fadein3 {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        .fadein3 {
            animation-name: fadein3;
            animation-duration: 1s;
        }

        img {
            width: 50%;
        }

        @media only screen and (min-width: 1224px) {
            img {
                width: 10%;
            }
        }

        #companies {
            background: transparent;
            display: flex;
            width: 100%;
            height: 12%;
            padding: 10 10 10 10;
            bottom: 0%;
            box-sizing: border-box;
            border-top: 2px solid rgb(243, 156, 18);
            text-align: center;
            vertical-align: middle;
        }

        .company {
            transition: all 0.25s;
            user-select: none;
            display: inline-block;
            color: white;
            background: transparent;
            width: 15vw;
            height: 15vw;
            line-height: 15vw;
            border-radius: 20px;
            margin: auto auto;
            font-family: 'Montserrat', sans-serif;
            border: 2px solid rgb(243, 156, 18);
            box-sizing: border-box;
        }

            .company:hover, .company:focus {
                background: rgba(243, 156, 18,1);
            }

        .buttons {
            transition: all 0.25s;
            user-select: none;
            display: inline-block;
            color: white;
            background: transparent;
            position: absolute;
            width: 15vw;
            height: 15vw;
            line-height: 14.5vw;
            margin: 10;
            margin-top: 0;
            float: left;
            border-radius: 50%;
            font-family: 'Montserrat', sans-serif;
            border: 2px solid rgb(243, 156, 18);
            box-sizing: border-box;
        }

        a, a:hover, a:focus, a:active {
            text-decoration: none;
            -webkit-tap-highlight-color: transparent !important;
        }

        .header {
            padding-top: 8%;
            padding-bottom: 8%;
        }

        .post {
            display: inline-block;
            width: 80%;
            height: fit-content;
            background: rgba(243, 156, 18, 0.3);
            margin: 30 0 10 0;
            border-radius: 20px;
            border: 2px solid rgb(243, 156, 18);
            box-sizing: border-box;
        }

        .postbuttons {
            transition: all 0.25s;
            user-select: none;
            display: inline-block;
            color: white;
            background: transparent;
            width: 10vw;
            height: 10vw;
            margin: 5;
            border-radius: 50%;
            font-family: 'Montserrat', sans-serif;
            border: 1px solid rgb(243, 156, 18);
            box-sizing: border-box;
            padding: 5;
        }

            .postbuttons:hover {
                background: rgb(243, 156, 18);
            }

        .progressbar {
            display: inline-block;
            width: 80%;
            height: 10%;
            padding: 10;
            vertical-align: middle;
            font-family: 'Montserrat', sans-serif;
            background: rgba(0,0,0, 0.5);
            margin-top: 30;
            border-radius: 20px;
            border: 2px solid rgb(243, 156, 18);
            box-sizing: border-box;
            color: white;
            position: relative;
        }
        li {
            font-family: 'Montserrat', sans-serif;
            border: 2px solid rgba(243, 156, 18);
            width: 4em;
            height: 4em;
            text-align: center;
            line-height: 4em;
            border-radius: 1em;
            background: rgba(243, 156, 18);
            margin: 0 1em;
            margin-bottom: 5;
            display: inline-block;
            color: white;
            position: relative;
        }

            li::before {
                content: '';
                position: absolute;
                top: 1.5em;
                left: -4em;
                width: 3.8em;
                height: .2em;
                background: rgba(243, 156, 18);
                z-index: -1;
                border: 2px solid rgba(243, 156, 18);
            }


            li:first-child::before {
                display: none;
            }

        .active {
            background: rgba(243, 156, 18);
        }

            .active ~ li {
                background: black;
            }

                .active ~ li::before {
                    background: black;
                }
        ul{
            padding: 0;
        }
        :root {
            --form-control-color: rgba(243, 156, 18);
            --form-control-disabled: #959495;
        }

        *,
        *:before,
        *:after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
        }

        form {

        }

        .form-control {
            font-family: system-ui, sans-serif;
            font-size: 2rem;
            font-weight: bold;
            line-height: 1.1;
            display: grid;
            grid-template-columns: 1em auto;
            gap: 0.5em;
        }

            .form-control + .form-control {
                margin-top: 1em;
            }

        .form-control--disabled {
            color: var(--form-control-disabled);
            cursor: not-allowed;
        }

        input[type="checkbox"] {
            /* Add if not using autoprefixer */
            -webkit-appearance: none;
            /* Remove most all native input styles */
            appearance: none;
            /* For iOS < 15 */
            background-color: var(--form-background);
            /* Not removed via appearance */
            margin: 0;
            font: inherit;
            color: currentColor;
            width: 1.15em;
            height: 1.15em;
            border: 0.15em solid currentColor;
            border-radius: 0.15em;
            transform: translateY(-0.075em);
            display: grid;
            place-content: center;
        }

            input[type="checkbox"]::before {
                content: "";
                width: 0.65em;
                height: 0.65em;
                clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
                transform: scale(0);
                transform-origin: bottom left;
                transition: 120ms transform ease-in-out;
                box-shadow: inset 1em 1em var(--form-control-color);
                /* Windows High Contrast Mode */
                background-color: CanvasText;
            }

            input[type="checkbox"]:checked::before {
                transform: scale(1);
            }

            input[type="checkbox"]:focus {
                outline: max(2px, 0.15em) solid currentColor;
                outline-offset: max(2px, 0.15em);
            }

            input[type="checkbox"]:disabled {
                --form-control-color: var(--form-control-disabled);
                color: var(--form-control-disabled);
                cursor: not-allowed;
            }
    </style>
    <title>
        Launch Zone
    </title>
</head>
<body>
    <div class="center">
        <div class="fadein2 header">
            <a href="company1_todo.html" class="buttons" style=" right: 0;"><</a>
            <h1 class="" style="color: white; font-family: 'Montserrat', sans-serif; text-align: left; margin: 0 0 0 20; font-size: 300%; ">To do</h1>
        </div>
        <form class="fadein2"style=" color: white; font-family: 'Montserrat', sans-serif; text-align:left; margin: 30;">
            <label class="form-control">
                <input type="checkbox" name="checkbox" />
                Business thing to do 1.
            </label>
            <label class="form-control">
                <input type="checkbox" name="checkbox" />
                Business thing to do 2.
            </label>
            <label class="form-control">
                <input type="checkbox" name="checkbox" />
                Business thing to do 3.
            </label>
            <label class="form-control">
                <input type="checkbox" name="checkbox" />
                Business thing to do 4.
            </label>

        </form>

    </div>
</body>
<html>
