<html>
<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link href="https://fonts.googleapis.com/css?family=Raleway:100" rel="stylesheet">
    <link rel="icon" href="Capture.PNG">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap');

        input:focus {
            outline: none;
        }

        ::placeholder {
            font-family: 'Raleway', sans-serif;
            color: rgb(243, 156, 18);
        }

        #b1 {
            display: inline-block;
            background: transparent;
            border: 2px solid rgb(243, 156, 18);
            padding: 10px 30px;
            color: rgb(243, 156, 18);
            font-family: 'Montserrat', sans-serif;
            transition: all 0.25s;
            border-radius: 5px;
        }

            #b1:hover {
                color: white;
                background: rgb(243, 156, 18);
            }

        body {
            background-color: rgb(21, 21, 21);
            border: 2px solid rgb(243, 156, 18);
            border-radius: 20px;
            background-image: url('background.jpg');
            background-size: cover;
            overflow: hidden;
            height: 100%;
            box-sizing: border-box;
            margin: 0;
        }
        .center {
                text-align:center;
                padding-top: 10%;
        }
        .button {
            transition: all 0.25s;
            color: white;
            background: transparent;
            display: block;
            border: 2px solid rgb(243, 156, 18);
            width: 40vw;
            height: 40vw;
            line-height: 40vw;
            font-family: 'Montserrat', sans-serif;
            border-radius: 100%;

        }
            .button:hover, .button:focus {
                background: rgb(243, 156, 18);
            }
        @keyframes fadein {
            from {
                opacity: 0;
                transform: scale(85%);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }
        .fadein {
            animation-name: fadein;
            animation-duration: 1s;
        }
        @keyframes fadein2 {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        .fadein2 {
            animation-name: fadein2;
            animation-duration: 1s;
        }
        img {
            width: 80%;
        }
        #censor {
            position: absolute;
            top: 0;
            background: black;
            color: white;
            width: 100%;
            height: 100%;
            text-align: center;
            line-height: 100vh;
            font-family: 'Montserrat', sans-serif;
            border-radius: 20px;
            display: none;
            z-index: 100;
        }
        @media only screen and (min-width: 1224px) {
            img{
                width: 10%;
            }
            #censor{
                display:block
            }
        }
        a, a:hover, a:focus, a:active {
            text-decoration: none;
            -webkit-tap-highlight-color: transparent !important;
        }
    </style>
    <title>
        Launch Zone
    </title>
</head>
<body>
    <div id="censor" style=" ">
        This website is made to be used on a mobile phone please reopen this page on your phone, Thank you so much!
    </div>
    <div class="center">
        <img class="fadein2" src="Capture.PNG" style=""></img>
        <div style="padding: 5% 10% 10% 10%; ">
            <a href="profile.html" class="button fadein" style="clear: left" > Profile </a>
            <a href="feed.html"class="button fadein" style="float: right"> Feed </a>
            <a href="chatzone.html"class="button fadein" style="float: left"> Chat Zone </a>
        </div>


    </div>
</body>
<html>
